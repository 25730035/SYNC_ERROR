<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[SYNC ERROR] Dark Memory Archive</title>
    <!-- 분위기를 극대화할 구글 프리미엄 웹폰트 'Noto Serif KR' 추가 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           1. 디자인 컨셉: 다크 아카이브 (Dark Terminal)
           ========================================= */
        :root {
            --kraft-dark: #120e0c;    /* 어두운 보관함 색상 */
            --paper-main: #1f1a18;    /* 건조하고 빛바랜 어두운 서류 */
            --paper-dark: #141110;    /* 서류 헤더/사이드바 */
            --ink-black: #e0d5c1;     /* 잉크 텍스트 (밝은 베이지) */
            --ink-red: #c93838;       /* 검열/위험 (검붉은색) */
            --ink-gray: #8a7b6e;      /* 보조 텍스트 (회갈색) */
            
            --text-gold: #dfa052;     /* 상황 설명용 미스터리 앰버 골드 */
            --font-sys: 'Courier New', Courier, monospace;
            --font-narr: 'Noto Serif KR', 'Batang', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #0c0a09;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: var(--font-sys);
            color: var(--ink-black);
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(60, 45, 35, 0.3) 0%, transparent 60%),
                radial-gradient(circle at 50% 100%, rgba(0, 0, 0, 0.8) 0%, transparent 70%),
                repeating-linear-gradient(rgba(0,0,0,0) 0px, rgba(0,0,0,0.2) 2px, transparent 2px, transparent 4px);
        }

        body::before {
            content: ''; position: absolute; top: -20%; left: 10%;
            width: 80%; height: 80%; background: radial-gradient(circle, rgba(201, 56, 56, 0.04) 0%, transparent 60%);
            pointer-events: none; z-index: -1;
        }

        /* =========================================
           2. 표지 (Cover Screen) 스타일
           ========================================= */
        #cover-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #0c0a09;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(201, 56, 56, 0.1) 0%, transparent 70%),
                repeating-linear-gradient(rgba(0,0,0,0) 0px, rgba(0,0,0,0.4) 2px, transparent 2px, transparent 4px);
            z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--ink-black);
            transition: opacity 0.8s ease-in-out;
        }

        #cover-screen::before {
            content: '';
            position: absolute;
            inset: -18px;
            background-image:
                linear-gradient(rgba(12, 10, 9, 0.55), rgba(12, 10, 9, 0.7)),
                url('images/cover.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(6px);
            opacity: 0.72;
            z-index: -1;
            transform: scale(1.04);
        }


        .cover-content {
            display: flex; flex-direction: column; align-items: center;
            animation: fadeInScene 1.5s ease-out forwards;
            position: relative; z-index: 1;
        }

        .cover-author {
            font-size: 1.5rem; color: var(--ink-gray); letter-spacing: 4px; margin-bottom: 30px;
            font-family: var(--font-narr); font-weight: bold;
        }

        /* 동화 제목 가장 크게 */
        .cover-title {
            font-size: 7rem; font-weight: 900; color: var(--ink-red);
            letter-spacing: 10px; margin: 0; text-align: center;
            text-shadow: 0 0 25px rgba(201, 56, 56, 0.5);
        }

        /* 변수 표시 */
        .cover-vars {
            font-size: 1.2rem; color: var(--ink-gray); margin-top: 40px; margin-bottom: 50px; text-align: center;
            line-height: 2; border: 1px dashed #444; padding: 20px 40px;
            background: rgba(0,0,0,0.6); font-family: var(--font-sys);
        }

        /* 시작 버튼 */
        .cover-start-btn {
            background: transparent; color: var(--ink-black); border: 2px solid var(--ink-black);
            font-size: 1.4rem; text-align: center; padding: 15px 40px; letter-spacing: 2px;
            cursor: pointer; transition: all 0.3s ease; font-family: var(--font-narr); font-weight: bold;
        }
        .cover-start-btn:hover {
            background: var(--ink-black); color: var(--paper-main); box-shadow: 0 0 25px rgba(224, 213, 193, 0.3); transform: scale(1.05);
        }

        /* =========================================
           3. 메인 바인더 프레임
           ========================================= */
        #clipboard-frame {
            width: 1300px; 
            height: 88vh;
            background: var(--kraft-dark);
            background-image: 
                linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 40%, rgba(0,0,0,0.6) 100%),
                url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.05"/></svg>');
            border-radius: 8px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.95), 0 15px 30px rgba(0,0,0,0.7), inset 0 2px 2px rgba(255,255,255,0.05), inset 0 -2px 5px rgba(0,0,0,0.8);
            padding: 20px; 
            display: none; 
            position: relative; z-index: 1;
        }

        #clipboard-frame::after {
            content: ''; position: absolute; top: 5%; left: 2%; right: 2%; bottom: -5%;
            background: rgba(0,0,0,0.9); filter: blur(25px); z-index: -1; border-radius: 10px; pointer-events: none;
        }

        .binder-rings {
            position: absolute; left: 35px; top: 10%; bottom: 10%;
            display: flex; flex-direction: column; justify-content: space-between; z-index: 10; pointer-events: none;
        }
        .ring { width: 30px; height: 10px; background: #555; border-radius: 5px; box-shadow: 0 3px 5px rgba(0,0,0,0.9), inset 0 2px 2px rgba(255,255,255,0.2); }

        /* 서류 본문 */
        #waybill-paper {
            flex-grow: 1; margin-left: 30px; background-color: var(--paper-main);
            background-image: 
                linear-gradient(rgba(224, 213, 193, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(224, 213, 193, 0.03) 1px, transparent 1px),
                url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.04"/></svg>');
            background-size: 20px 20px, 20px 20px, auto; border-radius: 2px;
            box-shadow: -5px 5px 20px rgba(0,0,0,0.7); display: flex; position: relative; overflow: hidden;
        }

        .watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 10rem; font-weight: 900; color: rgba(224, 213, 193, 0.02);
            pointer-events: none; z-index: 0; white-space: nowrap; font-family: 'Impact', sans-serif; letter-spacing: 10px;
        }

        .scene-enter { animation: fadeInScene 0.4s ease-out forwards; }
        @keyframes fadeInScene { 0% { opacity: 0; } 100% { opacity: 1; } }

        /* 4. 문서 레이아웃 */
        #doc-sidebar {
            width: 80px; background: rgba(0,0,0,0.2); border-right: 2px double rgba(224,213,193,0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding: 30px 0; z-index: 2;
        }
        .sidebar-text { writing-mode: vertical-rl; text-orientation: mixed; font-size: 0.75rem; color: var(--ink-red); font-weight: bold; letter-spacing: 3px; opacity: 0.8;}

        #doc-main { flex-grow: 1; display: flex; flex-direction: column; z-index: 2; position: relative; }

        #main-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 20px 30px; border-bottom: 2px solid rgba(224,213,193,0.1);
        }
        
        .header-barcode {
            flex: 1; font-size: 1.8rem; font-weight: bold; letter-spacing: -2px;
            color: var(--ink-gray); opacity: 0.6; margin-top: 5px; text-align: left;
        }

        .header-title { flex: 1; display: flex; flex-direction: column; align-items: center; } 
        .header-title h1 { font-size: 2rem; letter-spacing: 5px; color: var(--ink-red); margin: 0; font-weight: 900; white-space: nowrap; }
        #home-title-btn { cursor: pointer; transition: all 0.2s ease; }
        #home-title-btn:hover { color: var(--ink-black); text-shadow: 0 0 15px rgba(224, 213, 193, 0.5); transform: scale(1.03); }
        #home-title-btn:active { transform: scale(0.97); }
        .header-title p { font-size: 0.8rem; font-weight: bold; letter-spacing: 2px; color: var(--ink-gray); margin-top: 5px; }
        
        .header-meta { flex: 1; text-align: right; font-size: 0.75rem; color: var(--ink-gray); font-weight: bold; line-height: 1.4; }
        .header-meta .red-box { background: var(--ink-red); color: var(--ink-black); padding: 2px 5px; display: inline-block; margin-bottom: 5px;}

        #hud-label {
            display: flex; justify-content: center; align-items: stretch;
            border-bottom: 1px solid rgba(224,213,193,0.1); background: rgba(0,0,0,0.2); padding: 0;
        }
        .label-section {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; border-right: 1px solid rgba(224,213,193,0.1); padding: 12px 30px; flex: 1;
        }
        .label-section:last-child { border-right: none; }
        .stat-label { font-size: 0.7rem; font-weight: bold; color: var(--ink-gray); margin-bottom: 5px; text-transform: uppercase;}
        .stat-val { font-size: 1.6rem; font-weight: bold; color: var(--ink-black); transition: transform 0.1s;}

        /* 5. 중앙 스테이지 */
        #stage { flex-grow: 1; display: flex; padding: 30px; gap: 40px; overflow: hidden; opacity: 0; }

        #attachment-area { flex: 1.1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .photo-wrapper {
            background: #1c1816; padding: 10px 10px 40px 10px; box-shadow: 2px 4px 10px rgba(0,0,0,0.5);
            position: relative; transform: rotate(-1.5deg); transition: all 0.3s ease; border: 1px solid #3a322d; width: 100%;
            max-width: 420px; 
        }
        .photo-wrapper:hover { transform: rotate(0deg) scale(1.03); box-shadow: 5px 10px 20px rgba(0,0,0,0.6); z-index: 10; }
        .photo-wrapper::before {
            content: ''; position: absolute; top: -15px; left: 20px; width: 15px; height: 40px;
            border: 3px solid #555; border-radius: 10px; z-index: 10; box-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        
        #scene-img { width: 100%; height: 550px; object-fit: cover; filter: sepia(0.4) contrast(1.1) brightness(0.7) grayscale(0.2); }
        .photo-caption { text-align: center; margin-top: 15px; font-size: 0.9rem; font-weight: bold; color: var(--ink-gray); letter-spacing: 1px;}

        /* 대사 및 서류 본문 영역 */
        #letter-area { flex: 1.6; display: flex; flex-direction: column; position: relative; }
        .waybill-header { border-bottom: 1px dashed rgba(224,213,193,0.2); padding-bottom: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end;}
        #scene-title { font-size: 1.2rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; color: var(--ink-black); font-family: var(--font-sys); }
        
        #content-scroll-area {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
        }
        
        /* =========================================
           [가독성 보정] 단어 줄끝 걸침 방지 및 폰트 크기 변경
           ========================================= */

        /* 1. 상황 설명(지문) 박스 - 씬 타이틀 및 표지 텍스트와 완벽히 대응하는 밝은 베이지색(--ink-black)으로 지정 */
        #desc-text {
            font-family: var(--font-sys); 
            font-size: 1.15rem;           /* 등폭 폰트에 최적화된 편안한 고딕 크기 */
            line-height: 1.95;           /* 줄간격을 더 여유있게 하여 가독성 증폭 */
            color: var(--ink-black);      /* 씬 타이틀과 동일한 정석 베이지 색상으로 교체하여 일관성 제공 */
            font-weight: 500;
            padding: 20px; 
            background: rgba(18, 14, 12, 0.6); 
            border-left: 4px solid var(--ink-red);
            border-radius: 0 4px 4px 0;
            margin-bottom: 25px;
            opacity: 0; transition: opacity 0.5s ease;
            /* 한 단어가 도중에 줄바꿈되어 잘리지 않게 방지 */
            word-break: keep-all;
            overflow-wrap: break-word;
            box-shadow: inset 2px 2px 10px rgba(0,0,0,0.5);
            letter-spacing: -0.3px;
        }
        .show-desc { opacity: 1 !important; }

        /* 2. 캐릭터 이름 - 대사보다 훨씬 크게 강조 */
        .dialogue-speaker {
            font-size: 1.6rem; 
            font-weight: 900; 
            color: var(--ink-black);
            display: inline-block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-family: var(--font-narr);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }

        /* 3. 대사 본문 - 지문 아래에서 흘러나오는 다크 터미널 무드 */
        #dialogue-text { 
            font-family: var(--font-narr); 
            font-size: 1.1rem; 
            line-height: 1.6; 
            color: var(--ink-gray); 
            font-weight: 500; 
            padding: 10px 15px; 
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(230,223,209,0.05); 
            margin-bottom: 15px;
            /* 단어 줄바꿈 유지로 깔끔하게 정렬 */
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        .typing-cursor::after { content: ' _'; animation: blink 1s step-end infinite; color: var(--ink-black); }
        @keyframes blink { 50% { opacity: 0; } }

        /* 6. 선택지 버튼 */
        #choice-container { 
            margin-top: auto; padding-top: 20px;
            display: flex; flex-direction: row; gap: 20px; 
        }
        
        .choice-btn {
            flex: 1; 
            background: rgba(0, 0, 0, 0.4); 
            color: var(--ink-black);     
            padding: 15px;
            text-align: left; font-family: var(--font-sys); font-weight: bold; font-size: 0.95rem;
            cursor: pointer; position: relative; transition: all 0.2s ease; opacity: 0; transform: translateY(5px);
            border: 2px solid var(--ink-gray); 
            border-radius: 4px; 
            z-index: 1; overflow: hidden;
            display: flex; align-items: center; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.4); 
        }
        
        .choice-btn::before { content: '>'; margin-right: 12px; font-size: 1.1rem; color: var(--ink-gray); transition: 0.2s; font-weight: bold; }
        
        .choice-btn:hover { 
            background: var(--ink-black); 
            color: var(--paper-main); 
            border-color: var(--ink-black); 
            padding-left: 20px; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.5); 
        }
        .choice-btn:hover::before { color: var(--paper-main); }

        .danger-choice { 
            background: rgba(201, 56, 56, 0.15); 
            color: var(--ink-red); 
            border-color: var(--ink-red); 
        }
        .danger-choice::before { color: var(--ink-red); }
        
        .danger-choice:hover { 
            background: var(--ink-red); 
            color: var(--paper-main); 
            border-color: var(--ink-red); 
        }
        .danger-choice:hover::before { color: var(--paper-main); }
        
        .choice-btn > span { position: relative; z-index: 2; pointer-events: none; line-height: 1.4;} 
        .reveal-btn { animation: fadeInScene 0.4s ease-out forwards; }

        /* 타격감 도장 오버레이 */
        #stamp-action {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2rem; font-weight: 900; color: var(--ink-red);
            border: 4px solid var(--ink-red); padding: 8px 20px; border-radius: 4px;
            opacity: 0; pointer-events: none; z-index: 300; transition: opacity 0.15s ease-in-out;
            letter-spacing: 4px; font-family: 'Impact', sans-serif; text-transform: uppercase;
        }
        #stamp-action.stamp-hit { opacity: 0.85; transform: translate(-50%, -50%) rotate(-10deg); }
        #stamp-action.stamp-blue { color: var(--ink-gray); border-color: var(--ink-gray); }

        /* =========================================
           7. 풀스크린 엔딩 연출 전용 스타일
           ========================================= */
        .ending-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(12, 10, 9, 0.98); z-index: 9999; display: none; opacity: 0;
            transition: opacity 1.5s ease-in-out;
            align-items: center; justify-content: center; flex-direction: column;
            padding: 40px; text-align: center;
        }

        #ending-content {
            max-width: 900px; display: flex; flex-direction: column; align-items: center; gap: 30px;
            max-height: 90vh; overflow-y: auto; padding-right: 15px;
        }

        #end-title { font-size: 3.5rem; letter-spacing: 8px; font-weight: 900; margin: 0; text-transform: uppercase; }

        #end-img {
            width: 100%;
            max-width: 640px;
            max-height: 360px;
            object-fit: cover;
            border: 1px solid rgba(224,213,193,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            filter: sepia(0.25) contrast(1.08) brightness(0.8);
            display: none;
        }
        
        /* 엔딩 페이지 하단 캐릭터 대사의 폰트 크기 및 색상 강조 (결과 텍스트 크기와 일체화) */
        #end-dialogue { 
            font-size: 1.35rem;          /* 결과 상단 설명 영역과 완전히 동일한 사이즈 설계 */
            font-family: var(--font-narr); 
            color: #ff4a4a;             /* 밝고 활활 타오르는 불꽃 같은 적색으로 생동감 부여 */
            line-height: 1.8; 
            font-style: italic; 
            font-weight: 700;
            text-shadow: 0 0 15px rgba(255, 74, 74, 0.6); 
            text-align: center;
            word-break: keep-all;
            overflow-wrap: break-word;
        }
        
        /* 결과 안내 텍스트 가독성 및 생동감 향상 */
        #end-result { 
            font-size: 1.35rem;         /* 시선을 압도하는 크기 */
            color: #f0e6d2;             /* 고풍스럽고 가치 높은 양피지 질감의 미색 */
            font-weight: 700;
            border-top: 1px solid rgba(255,255,255,0.2); 
            padding-top: 25px; 
            letter-spacing: 1px; 
            line-height: 1.8; 
            font-family: var(--font-narr);
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        .reboot-btn {
            background: transparent; color: var(--ink-black); border: 2px solid var(--ink-black);
            font-size: 1.1rem; text-align: center; padding: 15px 40px; letter-spacing: 2px;
            cursor: pointer; transition: all 0.3s ease; font-family: var(--font-sys); font-weight: bold;
            margin-top: 20px;
        }
        .reboot-btn:hover { background: var(--ink-black); color: var(--paper-main); box-shadow: 0 0 20px rgba(224, 213, 193, 0.2); transform: scale(1.05);}
        
        .reboot-danger { border-color: var(--ink-red); color: var(--ink-red); }
        .reboot-danger:hover { background: var(--ink-red); color: var(--paper-main); box-shadow: 0 0 20px rgba(201,56,56,0.4); }
        
        .end-glitch { animation: endShake 0.4s infinite; }
        @keyframes endShake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-2px, 0px) rotate(-1deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            60% { transform: translate(-1px, 2px) rotate(0deg); }
            80% { transform: translate(2px, -1px) rotate(-1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
    </style>
</head>
<body>

    <!-- 표지 화면 -->
    <div id="cover-screen">
        <div class="cover-content">
            <div class="cover-author">25730035 / 임서연</div>
            <h1 class="cover-title">[ SYNC_ERROR ]</h1>
            <div class="cover-vars">
                $SYNC_WEIGHT: 50 &nbsp;&nbsp;|&nbsp;&nbsp;$ INTEGRITY_CHECK: 50 &nbsp;&nbsp;|&nbsp;&nbsp; $ WARNING_TRACE: 0
            </div>
            <button class="cover-start-btn" onclick="startGame()">[ 시스템 접속 ] : 선택시 동화 시작</button>
        </div>
    </div>

    <!-- 게임 본문 (초기에는 숨김 처리) -->
    <div id="clipboard-frame">
        <div class="binder-rings">
            <div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div>
        </div>

        <div id="waybill-paper">

        // 표지에서 접속
        function startGame() {
            stopAllVideos();
            const cover = document.getElementById('cover-screen');
            cover.style.opacity = '0';
            setTimeout(() => {
                cover.style.display = 'none';
                const clipboard = document.getElementById('clipboard-frame');
                clipboard.style.display = 'flex';
                updateStats(0,0,0);
                loadScene('S1');
            }, 800); 
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        function updateStats(ds, di, dt) {
            const oldSync = state.sync;
            const oldInt = state.integrity;
            const oldTrace = state.trace;

            state.sync = Math.min(100, Math.max(0, state.sync + ds));
            state.integrity = Math.min(100, Math.max(0, state.integrity + di));
            state.trace = Math.min(100, Math.max(0, state.trace + dt));
            
            animateValue(document.getElementById('val-sync'), oldSync, state.sync, 400);
            animateValue(document.getElementById('val-int'), oldInt, state.integrity, 400);
            animateValue(document.getElementById('val-trace'), oldTrace, state.trace, 400);
            
            const tEl = document.getElementById('val-trace');
            if(state.trace >= 50) tEl.classList.add('threat-alert');
            else tEl.classList.remove('threat-alert');
        }

        function loadScene(id) {
            const node = storyNodes[id];
            if(!node) return;
            if(typeTimeout) clearTimeout(typeTimeout);

            if(node.isEnding) {
                stopVideo(document.getElementById('scene-img'));
                renderEnding(node);
                return;
            }

            const stageEl = document.getElementById('stage');
            stageEl.classList.remove('scene-enter');
            void stageEl.offsetWidth; 
            stageEl.classList.add('scene-enter');

            const imgEl = document.getElementById('scene-img');
            stopVideo(imgEl);
            imgEl.src = node.img;
            if (imgEl.tagName === 'VIDEO') {
                imgEl.muted = false;
                imgEl.volume = 1;
                imgEl.load();
                imgEl.play().catch(() => {});
            }
            document.getElementById('photo-cap').innerText = "IMG_REF_" + id;
            document.getElementById('scene-title').innerText = node.title;

            const diagEl = document.getElementById('dialogue-text');
            const descEl = document.getElementById('desc-text');
            
            diagEl.innerHTML = '';
            descEl.innerHTML = '';
            descEl.classList.remove('show-desc');
            diagEl.classList.add('typing-cursor');

            // 새로운 씬을 로드할 때 스크롤 위치를 항상 맨 위로 리셋
            const scrollArea = document.getElementById('content-scroll-area');
            if (scrollArea) {
                scrollArea.scrollTop = 0;
            }

            const container = document.getElementById('choice-container');
            container.innerHTML = '';

            let i = 0;
            const text = node.dialogue;
            let isTag = false;
            let tagContent = '';

            // 타이핑
            function type() {
                if(i < text.length) {
                    let char = text.charAt(i);
                    if(char === '<') {
                        isTag = true;
                        tagContent = '<';
                        i++;
                        type();
                        return;
                    }
                    if(isTag) {
                        tagContent += char;
                        if(char === '>') {
                            isTag = false;
                            diagEl.innerHTML += tagContent;
                            tagContent = '';
                        }
                        i++;
                        type();
                        return;
                    }
                    diagEl.innerHTML += char;
                    i++;
                    
                    let delay = 20 + Math.random() * 20;
                    if (char === '.' || char === '?' || char === '!') delay = 150;
                    else if (char === ',') delay = 80;

                    typeTimeout = setTimeout(type, delay);
                } else {
                    diagEl.classList.remove('typing-cursor');
                    renderChoices(node.choices, container);
                }
            }
            
            // 설명(지문)을 먼저 즉시 보여주고, 대사는 타이핑되도록 연출
            if (node.getDesc) {
                descEl.innerHTML = node.getDesc();
                descEl.classList.add('show-desc');
            }
            type();
        }

        function renderChoices(choices, container) {
            choices.forEach((c, idx) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn reveal-btn' + (c.danger ? ' danger-choice' : '');
                btn.style.animationDelay = (idx * 0.1) + "s";
                
                const textSpan = document.createElement('span');
                textSpan.innerText = c.text;
                btn.appendChild(textSpan);
                
                btn.onclick = () => {
                    const stamp = document.getElementById('stamp-action');
                    
                    stamp.innerText = c.danger ? 'DENIED' : 'ACCEPTED';
                    stamp.className = c.danger ? 'stamp-hit' : 'stamp-hit stamp-blue';
                    
                    setTimeout(() => {
                        stamp.className = '';
                        c.action();
                    }, 400); 
                };
                container.appendChild(btn);
            });
        }

        function renderEnding(node) {
            const overlay = document.getElementById('end-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.opacity = '1'; }, 50);

            const title = document.getElementById('end-title');

            if (endingContent) {
                endingContent.scrollTop = 0;
            }

            title.innerText = node.title;
            stopVideo(endImg);
            if (endImg && node.img) {
                endImg.src = node.img;
                endImg.style.display = 'block';
                if (endImg.tagName === 'VIDEO') {
                    endImg.muted = false;
                    endImg.volume = 1;
                    endImg.load();
                    endImg.play().catch(() => {});
                }
            } else if (endImg) {
                endImg.style.display = 'none';
            }
            // 지문이 담긴 result를 먼저, 그 아래에 생동감 있는 대사(dialogue)를 출력
            result.innerHTML = node.result;     
            dialogue.innerHTML = node.dialogue;

            if(node.isError) {
                title.style.color = "var(--ink-red)";
                title.classList.add('end-glitch'); 
            } else if(node.endingType === 'LIBERATION') {

                title.style.color = "#8a7b6e"; 
            }

            setTimeout(() => {
                const restartBtn = document.createElement('button');
                restartBtn.className = 'reboot-btn' + (node.isError ? ' reboot-danger' : '');
                
                if(node.isError) {
                    restartBtn.innerText = "SYSTEM REBOOT [시스템 포맷 중...]";
                } else {
                    restartBtn.innerText = ">> 배달 업무 재할당 (REBOOT)";
                }

                restartBtn.onclick = () => restartGame();
                btnContainer.appendChild(restartBtn);
            }, 2500); 
        }

        function restartGame() {
            const overlay = document.getElementById('end-overlay');
            const cover = document.getElementById('cover-screen');
            const clipboard = document.getElementById('clipboard-frame');
            const btnContainer = document.getElementById('end-button-container');
            const endImg = document.getElementById('end-img');

            stopAllVideos();
            overlay.style.opacity = '0';
            
            setTimeout(() => {
                overlay.style.display = 'none';
                btnContainer.innerHTML = ''; 
                if (endImg) {
                    if (endImg.tagName === 'VIDEO') endImg.pause();
                    endImg.src = '';
                    endImg.style.display = 'none';
                }

                clipboard.style.display = 'none';
                cover.style.display = 'flex';
                
                setTimeout(() => { cover.style.opacity = '1'; }, 50);

                state = { sync: 50, integrity: 50, trace: 0, lastNode: null };
                document.getElementById('val-sync').innerHTML = '50';
                document.getElementById('val-int').innerHTML = '50';
                document.getElementById('val-trace').innerHTML = '0';
                document.getElementById('val-trace').classList.remove('threat-alert');
            }, 800);
        }

        window.onload = () => {
            // 게임은 표지 화면에서 시작
        };
    </script>
</body>
</html>
